<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Website</title>
    <style>
        .iframe-container {
            width: 100%;
            max-width: 800px;
            height: 500px;
            border: 2px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            margin: 20px auto;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">My Embedded Website</h2>

    <div class="iframe-container">
        <iframe src="https://example.com" title="My Website" loading="lazy"></iframe>
    </div>

</body>
</html>
